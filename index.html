<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Flowers Summer Camp 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --green: #5a9e6f; --green-dark: #3d7a52; --green-light: #e8f5ec; --amber: #e8a838; --coral: #e8705a; --cream: #fdf8f0; --brown: #7a5c3a; --text: #3a2e22; --border: #d4c4a8; }
        * { box-sizing: border-box; outline: none; }
        body { margin: 0; font-family: 'Nunito', sans-serif; background-color: var(--cream); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        #app-container { width: 100%; max-width: 700px; padding: 40px 20px 120px 20px; }
        .card { background: #fff; border-radius: 24px; padding: 35px; box-shadow: 0 10px 30px rgba(122, 92, 58, 0.1); min-height: 500px; display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h1, h2 { font-family: 'Baloo 2', cursive; color: var(--green-dark); margin-bottom: 15px; }
        .label { font-family: 'Baloo 2', cursive; color: var(--brown); font-size: 1.1rem; display: block; margin-top: 10px; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 14px; margin-bottom: 12px; font-family: inherit; font-size: 1rem; }
        .option-card { border: 2px solid var(--border); border-radius: 18px; padding: 20px; cursor: pointer; margin-bottom: 12px; background: #fff; transition: 0.2s; font-weight: bold; font-size: 1.1rem; }
        .option-card:hover { border-color: var(--green); }
        .selected { border-color: var(--green) !important; background: var(--green-light) !important; border-width: 3px !important; }
        .badge-amber { background: var(--amber); color: #fff; padding: 6px 14px; border-radius: 50px; display: inline-block; font-weight: bold; margin-bottom: 15px; }
        #nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid var(--border); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .btn { padding: 12px 28px; border-radius: 50px; border: none; font-family: 'Baloo 2'; font-size: 1.1rem; cursor: pointer; }
        .btn-primary { background: var(--green); color: #fff; }
        .btn-ghost { background: transparent; color: var(--brown); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <main id="app-container"><div id="step-content"></div></main>
    <footer id="nav-bar" class="hidden">
        <button id="btn-back" class="btn btn-ghost" onclick="prevStep()">← Back</button>
        <button id="btn-next" class="btn btn-primary" onclick="nextStep()">Next →</button>
    </footer>

    <script>
        const FORMSPREE_ID = "mgoprplj";
        const TOTAL_EARLY_BIRD_SLOTS = 8;
        
        // Slot logic
        if (localStorage.getItem('lf_count_final') !== '0' && !localStorage.getItem('reset_v3')) {
            localStorage.setItem('lf_count_final', '0');
            localStorage.setItem('reset_v3', 'true');
        }

        let currentStep = 0;
        let flow = ['welcome'];
        let data = { regType: '', count: 1, children: [], pName: '', pPhone: '', address: '' };

        function render() {
            const step = flow[currentStep];
            const div = document.getElementById('step-content');
            const nav = document.getElementById('nav-bar');
            nav.classList.toggle('hidden', step === 'welcome' || step === 'success');
            
            const used = parseInt(localStorage.getItem('lf_count_final')) || 0;
            const slots = TOTAL_EARLY_BIRD_SLOTS - used;

            if (step === 'welcome') {
                div.innerHTML = `<div class="card" style="text-align:center; justify-content:center;"><h1>Little Flowers <br>Summer Camp 2026</h1><div class="badge-amber">🌟 ${slots} Early Bird Slots Left!</div><p>📍 Gozaria, Gujarat</p><button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="start()">Start Registration →</button></div>`;
            } 
            else if (step === 'regType') {
                div.innerHTML = `<div class="card"><h2>Registration Type</h2>
                    <div onclick="setReg('single', 1)" class="option-card">👦 Single Student</div>
                    <div onclick="setReg('siblings', 2)" class="option-card">👫 Siblings (2-4 children)</div>
                    <div onclick="setReg('group', 5)" class="option-card">👥 Group (5+ children)</div>
                </div>`;
            }
            else if (step === 'count') {
                div.innerHTML = `<div class="card"><h2>Number of Children</h2><label class="label">Total count for this registration:</label><input type="number" id="incnt" value="${data.count}" min="2" max="20"></div>`;
            }
            else if (step.startsWith('child-')) {
                const i = parseInt(step.split('-')[1]);
                const c = data.children[i] || {};
                div.innerHTML = `<div class="card"><h2>Child ${i+1} Details</h2>
                    <label class="label">Full Name</label><input type="text" id="iname" value="${c.name||''}" placeholder="Full Name">
                    <label class="label">Age (5-14)</label><input type="number" id="iage" value="${c.age||''}" placeholder="Age">
                    <label class="label">School Name</label><input type="text" id="ischool" value="${c.school||''}" placeholder="Current School">
                    <label class="label">Medical Conditions / Allergies</label><textarea id="imed" placeholder="Enter 'None' if applicable">${c.medical||''}</textarea>
                </div>`;
            }
            else if (step === 'parent') {
                div.innerHTML = `<div class="card"><h2>Parent & Contact</h2>
                    <label class="label">Parent/Guardian Name</label><input type="text" id="ipname" value="${data.pName||''}" placeholder="Parent's Name">
                    <label class="label">WhatsApp Number (10 digits)</label><input type="text" id="ipphone" value="${data.pPhone||''}" placeholder="10 Digit Mobile No" maxlength="10">
                    <label class="label">Residential Address</label><textarea id="iaddr" placeholder="Full Home Address">${data.address||''}</textarea>
                </div>`;
            }
            else if (step === 'success') {
                div.innerHTML = `<div class="card" style="text-align:center; justify-content:center;"><h1>🌸 Submitted!</h1><p>Thank you! We have received your registration and will contact you via WhatsApp soon.</p></div>`;
            }
        }

        function start() { flow = ['welcome', 'regType']; currentStep = 1; render(); }
        
        function setReg(type, count) {
            data.regType = type;
            data.count = count;
            flow = ['welcome', 'regType'];
            if (type !== 'single') flow.push('count');
            // Re-build child steps based on current count
            updateFlow();
            currentStep++; render();
        }

        function updateFlow() {
            // Keep welcome, regType, (maybe count)
            const base = data.regType === 'single' ? 2 : 3;
            flow = flow.slice(0, base);
            for(let i=0; i<data.count; i++) flow.push(`child-${i}`);
            flow.push('parent');
        }

        function nextStep() {
            const curr = flow[currentStep];
            if (curr === 'count') {
                data.count = parseInt(document.getElementById('incnt').value);
                updateFlow();
            }
            if (curr.startsWith('child-')) {
                const i = parseInt(curr.split('-')[1]);
                data.children[i] = { name: document.getElementById('iname').value, age: document.getElementById('iage').value, school: document.getElementById('ischool').value, medical: document.getElementById('imed').value };
            }
            if (curr === 'parent') {
                data.pName = document.getElementById('ipname').value;
                data.pPhone = document.getElementById('ipphone').value;
                data.address = document.getElementById('iaddr').value;
                if(data.pPhone.length !== 10) { alert("Enter 10-digit phone."); return; }
                submit(); return;
            }
            currentStep++; render();
        }

        function prevStep() { if(currentStep > 1) { currentStep--; render(); } }

        async function submit() {
            document.getElementById('btn-next').innerText = "⏳ Sending...";
            document.getElementById('btn-next').disabled = true;
            try {
                await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
                localStorage.setItem('lf_count_final', (parseInt(localStorage.getItem('lf_count_final')) || 0) + 1);
                flow.push('success'); currentStep++; render();
            } catch (e) {
                alert("Check internet and try again.");
                document.getElementById('btn-next').disabled = false;
                document.getElementById('btn-next').innerText = "Next →";
            }
        }
        render();
    </script>
</body>
</html>
