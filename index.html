<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Flowers Registration 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --green: #5a9e6f; --green-dark: #3d7a52; --green-light: #e8f5ec; --amber: #e8a838; --cream: #fdf8f0; --brown: #7a5c3a; --text: #3a2e22; --border: #d4c4a8; }
        body { margin: 0; font-family: 'Nunito', sans-serif; background-color: var(--cream); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        #app-container { width: 100%; max-width: 600px; padding-bottom: 100px; }
        .card { background: #fff; border-radius: 20px; padding: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); min-height: 400px; }
        h1, h2 { font-family: 'Baloo 2', cursive; color: var(--green-dark); margin-top: 0; }
        .label { font-weight: 700; color: var(--brown); display: block; margin: 15px 0 5px 0; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; margin-bottom: 10px; }
        .btn-choice { width: 100%; padding: 20px; border: 2px solid var(--border); border-radius: 15px; background: #fff; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: 0.2s; }
        .btn-choice:active { transform: scale(0.98); background: var(--green-light); border-color: var(--green); }
        .badge { background: var(--amber); color: #fff; padding: 5px 12px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        #nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid var(--border); padding: 15px; display: flex; justify-content: space-between; }
        .btn-nav { padding: 12px 25px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        .btn-next { background: var(--green); color: #fff; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="app-container"><div id="content"></div></div>
    <div id="nav-bar" class="hidden">
        <button class="btn-nav" onclick="prev()">← Back</button>
        <button id="next-text" class="btn-nav btn-next" onclick="next()">Next →</button>
    </div>

    <script>
        const FORMSPREE_ID = "mgoprplj";
        const TOTAL_SLOTS = 8;
        
        // Force reset to 8 slots for the first time you open it
        if (localStorage.getItem('lf_reg_2026') !== '0' && !localStorage.getItem('reset_ok')) {
            localStorage.setItem('lf_reg_2026', '0');
            localStorage.setItem('reset_ok', 'true');
        }

        let step = 0;
        let flow = ['start'];
        let store = { count: 1, children: [], pName: '', pPhone: '', addr: '' };

        function render() {
            const current = flow[step];
            const div = document.getElementById('content');
            const nav = document.getElementById('nav-bar');
            nav.classList.toggle('hidden', current === 'start' || current === 'done');

            const count = parseInt(localStorage.getItem('lf_reg_2026')) || 0;
            const left = TOTAL_SLOTS - count;

            if (current === 'start') {
                div.innerHTML = `<div class="card" style="text-align:center"><h1>Little Flowers 2026</h1><div class="badge">🌟 ${left} Early Bird Slots Left!</div><p>Summer Camp Registration Form</p><button class="btn-choice" style="background:var(--green); color:#fff" onclick="goType()">Start Now →</button></div>`;
            } else if (current === 'type') {
                div.innerHTML = `<div class="card"><h2>Who is joining?</h2><button class="btn-choice" onclick="setType(1)">👦 Single Child</button><button class="btn-choice" onclick="goCount()">👫 Siblings / Group</button></div>`;
            } else if (current === 'count') {
                div.innerHTML = `<div class="card"><h2>How many children?</h2><input type="number" id="incnt" value="2" min="2" max="10"></div>`;
            } else if (current.startsWith('c-')) {
                const i = parseInt(current.split('-')[1]);
                div.innerHTML = `<div class="card"><h2>Child ${i+1}</h2>
                    <label class="label">Full Name</label><input type="text" id="iname" placeholder="Name">
                    <label class="label">Age (5-14)</label><input type="number" id="iage" placeholder="Age">
                    <label class="label">School Name</label><input type="text" id="ischool" placeholder="School">
                    <label class="label">Medical / Allergy Info</label><textarea id="imed" placeholder="Write 'None' if none"></textarea>
                </div>`;
            } else if (current === 'parent') {
                div.innerHTML = `<div class="card"><h2>Parent Details</h2>
                    <label class="label">Parent Name</label><input type="text" id="ipname" placeholder="Full Name">
                    <label class="label">WhatsApp Number</label><input type="text" id="ipphone" placeholder="10 Digits" maxlength="10">
                    <label class="label">Home Address</label><textarea id="iaddr" placeholder="Full Residential Address"></textarea>
                </div>`;
            } else if (current === 'done') {
                div.innerHTML = `<div class="card" style="text-align:center"><h1>🌸 Success!</h1><p>Registration complete. We will contact you soon!</p></div>`;
            }
        }

        function goType() { flow = ['start', 'type']; step = 1; render(); }
        function goCount() { flow = ['start', 'type', 'count']; step = 2; render(); }
        function setType(n) { 
            store.count = n; 
            flow = ['start', 'type'];
            for(let i=0; i<n; i++) flow.push('c-'+i);
            flow.push('parent');
            step = 2; render();
        }
        function next() {
            const curr = flow[step];
            if (curr === 'count') {
                store.count = parseInt(document.getElementById('incnt').value);
                flow = ['start', 'type', 'count'];
                for(let i=0; i<store.count; i++) flow.push('c-'+i);
                flow.push('parent');
            }
            if (curr.startsWith('c-')) {
                const i = parseInt(curr.split('-')[1]);
                store.children[i] = { name: document.getElementById('iname').value, age: document.getElementById('iage').value, school: document.getElementById('ischool').value, med: document.getElementById('imed').value };
            }
            if (curr === 'parent') {
                store.pName = document.getElementById('ipname').value;
                store.pPhone = document.getElementById('ipphone').value;
                store.addr = document.getElementById('iaddr').value;
                send(); return;
            }
            step++; render();
        }
        function prev() { if(step > 1) { step--; render(); } }
        async function send() {
            document.getElementById('next-text').innerText = "Sending...";
            await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(store)});
            localStorage.setItem('lf_reg_2026', (parseInt(localStorage.getItem('lf_reg_2026')) || 0) + 1);
            flow.push('done'); step++; render();
        }
        render();
    </script>
</body>
</html>
